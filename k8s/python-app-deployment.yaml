apiVersion: v1
kind: ConfigMap
metadata:
  name: python-app-config
  namespace: secure-apps
data:
  PORT: "8080"
  PYTHONUNBUFFERED: "1"
---
apiVersion: v1
kind: Secret
metadata:
  name: python-app-secrets
  namespace: secure-apps
type: Opaque
stringData:
  LICENSE_KEY: "DEMO-LICENSE-KEY"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: secure-python-app
  namespace: secure-apps
  labels:
    app: secure-python-app
    language: python
    security: medium-high
spec:
  replicas: 3
  selector:
    matchLabels:
      app: secure-python-app
  template:
    metadata:
      labels:
        app: secure-python-app
        language: python
        security: medium-high
    spec:
      # Security context for the pod
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      
      containers:
      - name: python-app
        image: secure-python-app:latest
        imagePullPolicy: IfNotPresent
        
        # Container security context
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1001
          capabilities:
            drop:
              - ALL
        
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        
        env:
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: python-app-config
              key: PORT
        - name: PYTHONUNBUFFERED
          valueFrom:
            configMapKeyRef:
              name: python-app-config
              key: PYTHONUNBUFFERED
        - name: LICENSE_KEY
          valueFrom:
            secretKeyRef:
              name: python-app-secrets
              key: LICENSE_KEY
        
        # Resource limits (Python needs more memory)
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        
        # Health checks
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        
        startupProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 0
          periodSeconds: 3
          timeoutSeconds: 3
          failureThreshold: 40
        
        # Volume mounts
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: cache
          mountPath: /home/appuser/.cache
      
      volumes:
      - name: tmp
        emptyDir: {}
      - name: cache
        emptyDir: {}
      
      # Pod anti-affinity
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - secure-python-app
              topologyKey: kubernetes.io/hostname
---
apiVersion: v1
kind: Service
metadata:
  name: secure-python-app
  namespace: secure-apps
  labels:
    app: secure-python-app
spec:
  type: ClusterIP
  selector:
    app: secure-python-app
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
    name: http
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: secure-python-app-hpa
  namespace: secure-apps
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: secure-python-app
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80

