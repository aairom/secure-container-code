apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: secure-apps-ingress
  namespace: secure-apps
  annotations:
    # NGINX Ingress Controller annotations
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    
    # Rate limiting
    nginx.ingress.kubernetes.io/limit-rps: "100"
    nginx.ingress.kubernetes.io/limit-connections: "10"
    
    # Security headers
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Frame-Options: DENY";
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "X-XSS-Protection: 1; mode=block";
      more_set_headers "Referrer-Policy: strict-origin-when-cross-origin";
    
    # CORS (adjust as needed)
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    
    # Timeouts
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "30"
    
    # Certificate manager (if using cert-manager)
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  
  # TLS configuration (uncomment and configure for production)
  # tls:
  # - hosts:
  #   - secure-apps.example.com
  #   secretName: secure-apps-tls
  
  rules:
  - host: secure-apps.example.com  # Change to your domain
    http:
      paths:
      # Go application
      - path: /go
        pathType: Prefix
        backend:
          service:
            name: secure-go-app
            port:
              number: 80
      
      # C++ application
      - path: /cpp
        pathType: Prefix
        backend:
          service:
            name: secure-cpp-app
            port:
              number: 80
      
      # Python application
      - path: /python
        pathType: Prefix
        backend:
          service:
            name: secure-python-app
            port:
              number: 80
      
      # Node.js application
      - path: /nodejs
        pathType: Prefix
        backend:
          service:
            name: secure-nodejs-app
            port:
              number: 80
---
# Alternative: Individual ingresses per application
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: secure-go-app-ingress
  namespace: secure-apps
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  rules:
  - host: go.secure-apps.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: secure-go-app
            port:
              number: 80
---
