apiVersion: v1
kind: Namespace
metadata:
  name: secure-apps
  labels:
    name: secure-apps
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: go-app-config
  namespace: secure-apps
data:
  PORT: "8080"
---
apiVersion: v1
kind: Secret
metadata:
  name: go-app-secrets
  namespace: secure-apps
type: Opaque
stringData:
  LICENSE_KEY: "DEMO-LICENSE-KEY"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: secure-go-app
  namespace: secure-apps
  labels:
    app: secure-go-app
    language: go
    security: high
spec:
  replicas: 3
  selector:
    matchLabels:
      app: secure-go-app
  template:
    metadata:
      labels:
        app: secure-go-app
        language: go
        security: high
    spec:
      # Security context for the pod
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      
      containers:
      - name: go-app
        image: secure-go-app:latest
        imagePullPolicy: IfNotPresent
        
        # Container security context
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 65532
          capabilities:
            drop:
              - ALL
        
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        
        env:
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: go-app-config
              key: PORT
        - name: LICENSE_KEY
          valueFrom:
            secretKeyRef:
              name: go-app-secrets
              key: LICENSE_KEY
        
        # Resource limits
        resources:
          requests:
            memory: "16Mi"
            cpu: "10m"
          limits:
            memory: "64Mi"
            cpu: "100m"
        
        # Health checks
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 2
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 3
          periodSeconds: 5
          timeoutSeconds: 2
          failureThreshold: 2
        
        # Startup probe for slow starting containers
        startupProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 0
          periodSeconds: 2
          timeoutSeconds: 2
          failureThreshold: 30
        
        # Volume mounts for tmp (since root is read-only)
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      
      volumes:
      - name: tmp
        emptyDir: {}
      
      # Pod anti-affinity for high availability
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - secure-go-app
              topologyKey: kubernetes.io/hostname
---
apiVersion: v1
kind: Service
metadata:
  name: secure-go-app
  namespace: secure-apps
  labels:
    app: secure-go-app
spec:
  type: ClusterIP
  selector:
    app: secure-go-app
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
    name: http
  sessionAffinity: None
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: secure-go-app-hpa
  namespace: secure-apps
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: secure-go-app
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      - type: Pods
        value: 2
        periodSeconds: 30
      selectPolicy: Max

